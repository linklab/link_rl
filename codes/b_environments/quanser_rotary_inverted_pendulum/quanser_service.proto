syntax="proto3";

service RDIP {

  rpc reset(QuanserResetRequest) returns (QuanserStateResponse) {}

  rpc step(QuanserStepRequest) returns (QuanserStateResponse) {}

}

message QuanserStepRequest {
  float value = 1;
  string info = 2;
  float pub_id = 3;
}

message QuanserResetRequest {
  string info = 1;
  float pub_id = 2;
}

message QuanserStateResponse {
  float motor_radian = 1;
  float motor_velocity = 2;
  float pendulum_radian = 3;
  float pendulum_velocity = 4;
  float pub_id = 5;
  bool is_motor_limit = 6;
  bool reset_complete = 7;
}
